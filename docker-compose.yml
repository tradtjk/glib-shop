services:
  mysql:
    image: mysql:8.0
    container_name: golib-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: golibshop
      MYSQL_USER: golib
      MYSQL_PASSWORD: golib
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: golib-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: mysql
      DB_DATABASE: golibshop
      DB_USERNAME: golib
      DB_PASSWORD: golib
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

volumes:
  mysql_data:
